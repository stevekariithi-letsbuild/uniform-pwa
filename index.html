<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uniform Logger</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
#app{max-width:480px;margin:0 auto;padding:16px 16px 40px}
h2{font-size:20px;font-weight:700;margin-bottom:4px}
h3{font-size:15px;font-weight:600;margin:16px 0 8px}
.sub{font-size:13px;color:#888;margin-bottom:14px}
.back-btn{background:none;border:none;color:#888;font-size:14px;cursor:pointer;margin-bottom:12px;padding:0;display:block}
.search-input{width:100%;padding:10px 12px;border:1px solid #e5e5e0;border-radius:10px;font-size:15px;background:#fff;margin-bottom:10px}
.student-list{max-height:400px;overflow-y:auto;border:1px solid #e5e5e0;border-radius:10px;background:#fff}
.student-item{padding:11px 14px;border-bottom:1px solid #f0f0e8;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.student-item:last-child{border-bottom:none}
.student-item:active{background:#f0f0e8}
.meta{font-size:12px;color:#888}
.add-student-btn{display:block;width:100%;background:#fff;border:1px dashed #ccc;border-radius:10px;padding:12px;font-size:14px;color:#555;cursor:pointer;margin-top:10px;text-align:center}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.gender-btn{padding:14px;border:1px solid #e5e5e0;border-radius:10px;background:#fff;font-size:15px;cursor:pointer;text-align:center}
.gender-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.item-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.item-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.item-card-header span{font-size:14px;font-weight:500}
.nr-btn{font-size:12px;color:#888;background:none;border:1px solid #e5e5e0;border-radius:6px;padding:3px 8px;cursor:pointer}
.nr-btn.active{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.size-row{display:flex;flex-wrap:wrap;gap:6px}
.size-btn{padding:6px 12px;border:1px solid #e5e5e0;border-radius:8px;background:#f8f8f4;font-size:13px;cursor:pointer}
.size-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.full-set-btn{display:block;width:100%;background:#22c55e;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:14px}
label{display:block;font-size:13px;color:#555;margin:12px 0 4px}
input[type=text],select,textarea{width:100%;padding:10px 12px;border:1px solid #e5e5e0;border-radius:10px;font-size:15px;background:#fff}
textarea{height:70px;resize:vertical}
.btn-primary{display:block;width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px}
.school-btn{display:block;width:100%;text-align:left;background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:14px;cursor:pointer}
.school-btn small{display:block;font-size:12px;color:#888;margin-top:2px}
.loading{text-align:center;padding:40px;color:#888}
.success{text-align:center;padding:40px 20px}
.success h2{color:#166534;margin-bottom:8px}
.success p{color:#888;margin-bottom:20px}
.success button{background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:15px;cursor:pointer}
.error h2{color:#991b1b;margin-bottom:8px;margin-top:40px;text-align:center}
.error p{color:#888;text-align:center;margin-bottom:20px}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading…</div></div>
<script>
const SHEET_ID = '1EFjr4jxg4pr5FUp-O0p2SoEHv0jZEAMYuOQYVQtwx0s';
const API_KEY  = 'AIzaSyBcjDdYjBjVXHTbvyRey9rR80wVQbgEoHs';
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbz9PY-C-uWWVmwhhWVjKEV61CWafBNZIfKSE2fZIIcbPsuK5QBsBjjM_dEFy2c5bArJqw/exec';

const CLOTHING = ['Small','Medium','Large'];
const SHOES    = ['27/9','28/10','29/11','31/12','32/13','33/1','35/2','36/3','37/4','38/5','40/6','41/7','42/8'];
const BAG      = ['Receiving','Not receiving'];

let schools=[], students=[], itemSizes={}, notRecv={}, session={};
let myName = localStorage.getItem('loggerName')||'';
let pending = JSON.parse(localStorage.getItem('pending')||'[]');

const app = () => document.getElementById('app');
const set = html => { app().innerHTML = html; };

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── API with offline cache ──
async function fetchSheet(name) {
  const cacheKey = 'sheet_' + name;
  try {
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(name)}?key=${API_KEY}`);
    const d = await r.json();
    if (!d.values || d.values.length < 2) return [];
    const h = d.values[0];
    const rows = d.values.slice(1).map(row => Object.fromEntries(h.map((k,i) => [k, row[i]||''])));
    // Save to cache
    localStorage.setItem(cacheKey, JSON.stringify({ts: Date.now(), rows}));
    return rows;
  } catch(e) {
    // Offline — try cache
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const {ts, rows} = JSON.parse(cached);
      const mins = Math.round((Date.now()-ts)/60000);
      console.log(`Offline: using cached ${name} (${mins} min old)`);
      return rows;
    }
    throw new Error('No internet and no cached data for ' + name);
  }
}

async function writeRow(sheet, row) {
  const r = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({sheet, row})});
  const d = await r.json();
  if (!d.ok) throw new Error(d.error||'Write failed');
}

// ── LOAD ──
let isOffline = false;
async function init() {
  set('<div class="loading">Loading…</div>');
  try {
    schools = await fetchSheet('Schools');
    showSchools(); // Show schools immediately so user can see them
    students = await fetchSheet('Students'); // Load students in background
    showSchools(); // Refresh with student counts
  } catch(e) {
    // If schools loaded but students failed, still show schools
    if (schools.length > 0) {
      showSchools();
      return;
    }
    set(`<div class="error"><h2>Connection error</h2><p>${e.message}</p></div>`);
    const b = document.createElement('button');
    b.className='btn-primary'; b.textContent='Try again';
    b.style.maxWidth='200px'; b.style.margin='0 auto';
    b.onclick=init; app().appendChild(b);
  }
}

// Auto-refresh when coming back online
window.addEventListener('online', () => {
  if (schools.length > 0) {
    // Silently refresh data in background
    Promise.all([fetchSheet('Schools'), fetchSheet('Students')]).then(([s, st]) => {
      schools=s; students=st; isOffline=false;
    }).catch(()=>{});
  }
});

// ── SCREEN 1: NAME ──
function showName() {
  set(`<h2>Welcome</h2>
    <p class="sub" style="margin-top:8px">Enter your name to start logging.</p>
    <label>Your name</label>
    <input type="text" id="name-inp" placeholder="e.g. John">
    <button class="btn-primary" id="btn-name">Continue</button>`);
  document.getElementById('btn-name').onclick = () => {
    const v = document.getElementById('name-inp').value.trim();
    if (!v) return;
    myName = v; localStorage.setItem('loggerName', myName); showSchools();
  };
}

// ── SCREEN 2: SCHOOLS ──
function showSchools() {
  if (!myName) { showName(); return; }
  const offlineBanner = !navigator.onLine ? `<div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:8px 12px;font-size:12px;color:#92400e;margin-bottom:12px">⚠️ Offline — using cached data. Entries will sync when online.</div>` : '';
  set(`<h2>Uniform Logger</h2>
    <p class="sub" style="margin-top:4px">Logged in as <strong>${myName}</strong> &nbsp;<span id="change-link" style="color:#888;cursor:pointer;font-size:13px;text-decoration:underline">change</span></p>
    ${offlineBanner}
    <p class="sub">Select a school:</p>
    <div id="school-list">
      ${schools.map((s,i) => `<button class="school-btn" data-i="${i}">${s['Name']}<small>${s['Location']||''} · ${students.filter(st=>st['School']===s['Name']).length} students</small></button>`).join('')}
    </div>
    ${pending.length ? `<button class="school-btn" id="sync-btn" style="border-color:#f97316;color:#f97316">↑ Sync ${pending.length} pending entr${pending.length===1?'y':'ies'}</button>` : ''}`);
  document.getElementById('change-link').onclick = () => { myName=''; localStorage.removeItem('loggerName'); showName(); };
  document.querySelectorAll('#school-list .school-btn').forEach(btn => {
    btn.onclick = () => showStudents(schools[+btn.dataset.i]['Name']);
  });
  const sb = document.getElementById('sync-btn');
  if (sb) sb.onclick = syncNow;
}

// ── SCREEN 3: STUDENTS ──
function showStudents(schoolName, query='') {
  session = { school: schoolName };
  const all = students.filter(s => s['School']===schoolName);
  const shown = query ? all.filter(s => s['Name'].toLowerCase().includes(query.toLowerCase())) : all;
  set(`<button class="back-btn" id="btn-back">← Back</button>
    <h2>${schoolName}</h2>
    <p class="sub">${all.length} students · tap to select</p>
    <input class="search-input" type="text" id="search-inp" placeholder="Search by name…" value="${query}">
    <div class="student-list" id="slist">
      ${shown.map((s,i) => `<div class="student-item" data-i="${i}"><span>${s['Name']}</span><span class="meta">${s['Class']||''} · ${s['Gender']||''}</span></div>`).join('')}
      ${shown.length===0 ? '<div class="student-item" style="color:#888;cursor:default">No students found</div>' : ''}
    </div>
    <button class="add-student-btn" id="btn-add">+ Add new student</button>`);

  document.getElementById('btn-back').onclick = showSchools;
  document.getElementById('btn-add').onclick = () => showAddStudent(schoolName);
  document.getElementById('search-inp').oninput = function() { showStudents(schoolName, this.value); };

  const shownStudents = shown;
  document.querySelectorAll('#slist .student-item[data-i]').forEach(el => {
    el.onclick = () => {
      const s = shownStudents[+el.dataset.i];
      if (s) showItems(s['Name'], s['Gender'], s['Shoe Size']||'', s['Uniform Size']||'');
    };
  });
}

// ── SCREEN 4: ADD STUDENT ──
let newGender='';
function showAddStudent(schoolName) {
  newGender='';
  set(`<button class="back-btn" id="btn-back">← Back</button>
    <h2>New student</h2>
    <p class="sub">${schoolName}</p>
    <label>Full name</label>
    <input type="text" id="ns-name" placeholder="e.g. John Kamau">
    <label>Class</label>
    <input type="text" id="ns-class" placeholder="e.g. Grade 3">
    <label>Gender</label>
    <div class="gender-row">
      <button class="gender-btn" id="gb-boy">👦 Boy</button>
      <button class="gender-btn" id="gb-girl">👧 Girl</button>
    </div>
    <button class="btn-primary" id="btn-save">Add & log uniform</button>`);
  document.getElementById('btn-back').onclick = () => showStudents(schoolName);
  document.getElementById('gb-boy').onclick = () => { newGender='Boy'; document.getElementById('gb-boy').classList.add('active'); document.getElementById('gb-girl').classList.remove('active'); };
  document.getElementById('gb-girl').onclick = () => { newGender='Girl'; document.getElementById('gb-girl').classList.add('active'); document.getElementById('gb-boy').classList.remove('active'); };
  document.getElementById('btn-save').onclick = async () => {
    const name = document.getElementById('ns-name').value.trim();
    const cls = document.getElementById('ns-class').value.trim();
    if (!name||!newGender) { alert('Please enter name and select gender.'); return; }
    const ns = {School:schoolName, Name:name, Class:cls, Gender:newGender, 'Shoe Size':'', 'Uniform Size':'', Comments:''};
    try { await writeRow('Students', ns); } catch(e) { pending.push({_type:'student',...ns}); localStorage.setItem('pending',JSON.stringify(pending)); }
    students.push(ns);
    showItems(name, newGender, '', '');
  };
}

// ── SCREEN 5: ITEMS ──
function showItems(name, gender, shoeSize, uniformSize) {
  session.student=name; session.gender=gender;
  itemSizes={}; notRecv={};
  if (shoeSize) itemSizes['Shoes']=shoeSize;
  if (uniformSize) ['Shirt','Sweater','Shorts','Trousers','Dress','Skirt','Blouse'].forEach(k => itemSizes[k]=uniformSize);

  const boyItems  = [{k:'Shorts',s:CLOTHING},{k:'Trousers',s:CLOTHING},{k:'Shirt',s:CLOTHING},{k:'Sweater',s:CLOTHING},{k:'Tie',s:CLOTHING},{k:'Socks',s:CLOTHING},{k:'Shoes',s:SHOES},{k:'Boxers',s:CLOTHING},{k:'Bag',s:BAG}];
  
  // Check if older girl (Grade 7, 8, or 9) for boob top
  const studentRecord = students.find(s => s['Name']===name && s['School']===session.school);
  const cls = (studentRecord && studentRecord['Class']) ? studentRecord['Class'].toUpperCase().trim() : '';
  const isOlderGirl = gender==='Girl' && (cls==='GRADE 7' || cls==='GRADE 8' || cls==='GRADE 9');
  
  const girlBase = [{k:'Dress',s:CLOTHING},{k:'Skirt',s:CLOTHING},{k:'Blouse',s:CLOTHING},{k:'Sweater',s:CLOTHING},{k:'Socks',s:CLOTHING},{k:'Shoes',s:SHOES},{k:'Panties',s:CLOTHING}];
  if (isOlderGirl) girlBase.push({k:'Boob top',s:CLOTHING});
  girlBase.push({k:'Bag',s:BAG});
  const girlItems = girlBase;
  
  const items = gender==='Boy' ? boyItems : girlItems;
  session.items = items;

  set(`<button class="back-btn" id="btn-back">← Back</button>
    <h2>${name}</h2>
    <p class="sub">${session.school} · ${gender}</p>
    <button class="full-set-btn" id="btn-fullset">⚡ Full set — all items receiving</button>
    <h3>Or select sizes individually:</h3>
    ${items.map(item => {
      const id = item.k.replace(/ /g,'_');
      return `<div class="item-card">
        <div class="item-card-header"><span>${item.k}</span><button class="nr-btn" data-key="${item.k}" id="nr_${id}">Not receiving</button></div>
        <div class="size-row" id="sr_${id}">
          ${item.s.map(sz => `<button class="size-btn${itemSizes[item.k]===sz?' active':''}" data-key="${item.k}" data-val="${sz}">${sz}</button>`).join('')}
        </div>
      </div>`;
    }).join('')}
    <label>Direction</label>
    <select id="f-dir"><option value="Out">Out — giving to student</option><option value="In">In — collecting back</option></select>
    <label>Notes (optional)</label>
    <textarea id="f-notes" placeholder="Any notes…"></textarea>
    <button class="btn-primary" id="btn-save">Save entry</button>`);

  document.getElementById('btn-back').onclick = () => showStudents(session.school);

  document.getElementById('btn-fullset').onclick = () => {
    // Map stored uniform size codes to labels
    const sizeMap = {
      'SB':'Small','SG':'Small','MB':'Medium','MG':'Medium','LB':'Large','LG':'Large',
      'Small':'Small','Medium':'Medium','Large':'Large'
    };
    const clothingSize = sizeMap[uniformSize] || null;

    items.forEach(item => {
      let picked = null;
      if (item.k === 'Shoes') {
        // Use stored shoe size if it exists in options
        picked = item.s.includes(shoeSize) ? shoeSize : null;
      } else if (item.k === 'Bag') {
        picked = 'Receiving';
      } else {
        picked = clothingSize || item.s[0];
      }
      if (picked) {
        itemSizes[item.k] = picked;
        notRecv[item.k] = false;
        const id = item.k.replace(/ /g,'_');
        document.querySelectorAll(`#sr_${id} .size-btn`).forEach(b => b.classList.toggle('active', b.dataset.val===picked));
        document.getElementById(`nr_${id}`).classList.remove('active');
      }
    });
    document.getElementById('btn-save').scrollIntoView({behavior:'smooth'});
  };

  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.onclick = () => {
      const k=btn.dataset.key, v=btn.dataset.val, id=k.replace(/ /g,'_');
      itemSizes[k]=v; notRecv[k]=false;
      document.querySelectorAll(`#sr_${id} .size-btn`).forEach(b => b.classList.toggle('active', b.dataset.val===v));
      document.getElementById(`nr_${id}`).classList.remove('active');
    };
  });

  document.querySelectorAll('.nr-btn').forEach(btn => {
    btn.onclick = () => {
      const k=btn.dataset.key, id=k.replace(/ /g,'_');
      notRecv[k]=!notRecv[k];
      if (notRecv[k]) {
        itemSizes[k]='Not receiving';
        document.querySelectorAll(`#sr_${id} .size-btn`).forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
      } else { delete itemSizes[k]; btn.classList.remove('active'); }
    };
  });

  document.getElementById('btn-save').onclick = saveEntry;
}

// ── SAVE ──
async function saveEntry() {
  const entry = {
    School: session.school, Student: session.student, Gender: session.gender,
    Direction: document.getElementById('f-dir').value,
    Notes: document.getElementById('f-notes').value,
    'Logged By': myName, Timestamp: new Date().toISOString(),
    Shorts: itemSizes['Shorts']||'', Trousers: itemSizes['Trousers']||'',
    Shirt: itemSizes['Shirt']||'', Sweater: itemSizes['Sweater']||'',
    Tie: itemSizes['Tie']||'', Socks: itemSizes['Socks']||'',
    Shoes: itemSizes['Shoes']||'', Boxers: itemSizes['Boxers']||'',
    Dress: itemSizes['Dress']||'', Skirt: itemSizes['Skirt']||'',
    Blouse: itemSizes['Blouse']||'', Panties: itemSizes['Panties']||'',
    'Boob top': itemSizes['Boob top']||'', Bag: itemSizes['Bag']||'',
  };
  set('<div class="loading">Saving…</div>');
  try {
    await writeRow('Dispatches', entry);
    set(`<div class="success"><h2>✓ Saved!</h2><p>${entry.Student} · ${entry.Direction}</p><button id="btn-next">Next student</button></div>`);
  } catch(e) {
    pending.push(entry); localStorage.setItem('pending', JSON.stringify(pending));
    set(`<div class="success"><h2>✓ Saved offline</h2><p>Will sync when online.</p><button id="btn-next">Next student</button></div>`);
  }
  document.getElementById('btn-next').onclick = () => showStudents(session.school);
}

async function syncNow() {
  try {
    for (const e of [...pending]) await writeRow(e._type==='student'?'Students':'Dispatches', e);
    pending=[]; localStorage.setItem('pending','[]');
    alert('All synced!'); showSchools();
  } catch(e) { alert('Still offline.'); }
}

init();
</script>
</body>
</html>
