<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f1a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Uniform Tracker</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1a0f;
      --surface: #162016;
      --surface2: #1e2d1e;
      --border: #2a3d2a;
      --green: #4a9c2a;
      --green-light: #5cb832;
      --green-dim: #2d5a1b;
      --text: #e8f0e8;
      --text-dim: #7a9a7a;
      --text-muted: #4a6a4a;
      --accent: #a8d878;
      --red: #c0392b;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    /* ── SCREENS ── */
    .screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* ── HOME ── */
    .home-screen {
      padding: 0;
      justify-content: space-between;
    }

    .home-top {
      padding: 60px 28px 40px;
      background: linear-gradient(160deg, #162d16 0%, #0f1a0f 60%);
      border-bottom: 1px solid var(--border);
    }

    .app-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .home-top h1 {
      font-family: 'DM Mono', monospace;
      font-size: 36px;
      font-weight: 500;
      line-height: 1.1;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 300;
    }

    .home-actions {
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .online-status {
      padding: 12px 24px 24px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
    }

    .online { color: var(--green-light); }
    .offline { color: #e8a020; }

    /* ── HEADER ── */
    .screen-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .screen-header h2 {
      font-size: 17px;
      font-weight: 500;
      flex: 1;
    }

    .screen-header .sub {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }

    .back-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── LIST ── */
    .list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      text-align: left;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .list-item:active, .list-item.selected {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--accent);
    }

    /* ── FORM ── */
    .form-body {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .text-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      color: var(--text);
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
    }

    .text-input:focus { border-color: var(--green); }
    .text-input.small { padding: 10px 14px; font-size: 14px; }

    /* ── ITEMS ── */
    .items-screen { padding-bottom: 100px; }

    .items-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      overflow-y: auto;
    }

    .item-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 4px;
    }

    .item-label {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .size-select {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .size-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.12s;
    }

    .size-btn.active {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--accent);
      font-weight: 500;
    }

    .notes-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      resize: none;
      height: 72px;
      outline: none;
    }

    .notes-input:focus { border-color: var(--green); }

    /* ── FOOTER ── */
    .items-footer {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      display: flex;
      gap: 10px;
    }

    .items-footer.two-btn .btn-secondary { flex: 1; }
    .items-footer.two-btn .btn-primary { flex: 2; }

    /* ── BUTTONS ── */
    .btn-primary {
      flex: 1;
      background: var(--green);
      border: none;
      border-radius: var(--radius);
      padding: 15px 20px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .btn-primary:active { background: var(--green-light); }
    .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }

    .btn-secondary {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 15px 20px;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ── BADGE ── */
    .badge {
      background: var(--green);
      color: #fff;
      border-radius: 20px;
      min-width: 22px;
      height: 22px;
      font-size: 12px;
      font-weight: 600;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
    }

    /* ── REVIEW ── */
    .review-body {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
      padding-bottom: 100px;
    }

    .review-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .review-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .review-meta {
      font-size: 13px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }

    .review-items {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 10px;
    }

    .review-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .review-row:last-child { border-bottom: none; }
    .review-key { color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 12px; }
    .review-val { font-weight: 500; }

    .review-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .review-by {
      font-size: 13px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      text-align: center;
      padding: 8px;
    }

    /* ── SAVED ── */
    .saved-screen {
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 24px;
      text-align: center;
    }

    .saved-icon { font-size: 64px; margin-bottom: 8px; }
    .saved-screen h2 { font-size: 28px; color: var(--accent); }
    .saved-screen p { color: var(--text-dim); font-size: 15px; }
    .pending-note { color: #e8a020 !important; }
    .synced-note { color: var(--green-light) !important; }

    .saved-actions {
      width: 100%;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── PENDING ── */
    .pending-body { padding: 16px; flex: 1; }

    .pending-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 8px;
    }

    .pending-name { font-size: 15px; font-weight: 500; }
    .pending-meta { font-size: 12px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-top: 2px; }

    .empty { color: var(--text-dim); text-align: center; padding: 40px 0; font-size: 15px; }

    /* ── NOTES ROW ── */
    .notes-row .item-label { margin-bottom: 6px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/app.js"></script>
</body>
</html>
